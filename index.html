<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Lyrics</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#6200ea">
</head>
<body>
    <header>
        <h1>My Lyrics App</h1>
        <span id="status" class="online">Online</span>
    </header>

    <main>
        <h2>Song Title</h2>
        <p class="lyrics">
            Verse 1<br>
            This app works when the internet drops<br>
            Cached in the background, it never stops<br><br>
            Chorus<br>
            Offline mode is ready to go!<br>
            Just install the app and watch it flow.
        </p>
    </main>

    <script src="app.js"></script>
</body>
</html>
